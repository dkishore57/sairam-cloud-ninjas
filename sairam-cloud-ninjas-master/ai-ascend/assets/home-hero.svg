<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Careercraft workflow illustration</title>
  <desc id="desc">A four-step product workflow: career quiz, path selection, guided learning with AI mentor and quiz, and progress planning.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="860" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1630"/>
      <stop offset="1" stop-color="#1E2747"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="30" y="26" width="920" height="508" rx="26" fill="url(#bg)" stroke="#FFFFFF22"/>

