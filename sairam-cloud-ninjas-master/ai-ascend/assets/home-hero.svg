  <path d="M268 180C280 180 280 180 292 180" stroke="url(#accentB)" stroke-width="3" stroke-linecap="round"/>
  <path d="M492 180C504 180 504 180 516 180" stroke="url(#accentB)" stroke-width="3" stroke-linecap="round"/>
  <path d="M716 180C728 180 728 180 740 180" stroke="url(#accentB)" stroke-width="3" stroke-linecap="round"/>
