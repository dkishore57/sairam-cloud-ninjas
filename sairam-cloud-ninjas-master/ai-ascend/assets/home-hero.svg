  <text x="304" y="445" fill="#AAB4D6" font-family="Poppins, Segoe UI, sans-serif" font-size="11">Re-plan by availability</text>

  <rect x="492" y="402" width="184" height="72" rx="12" fill="#1B2548"/>
  <text x="504" y="426" fill="#DCE3FF" font-family="Poppins, Segoe UI, sans-serif" font-size="12">Mentor + Quiz</text>
