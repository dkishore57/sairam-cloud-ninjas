  <text x="92" y="326" fill="#EEF2FF" font-family="Poppins, Segoe UI, sans-serif" font-size="19" font-weight="600">Continuous Improvement Loop</text>

  <rect x="92" y="344" width="798" height="16" rx="8" fill="#2D3768"/>
