<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
<header class="topbar">
  <div class="brand">CAREER CRAFT</div>
  <nav class="topnav">
    <a class="text-link" href="dashboard.html">Dashboard</a>
    <a class="text-link" href="dashboard.html">Home</a>
    <a class="text-link" href="path-generator.html">AI Path Generator</a>
    <a class="text-link" href="skill-gap.html">AI Skill Gap</a>
    <button class="text-link-btn logout-btn" type="button">Logout</button>
  </nav>
</header>

<main class="learn-layout">
  <section class="panel">
    <p class="eyebrow">Selected Path</p>
    <h2 id="learn-title">Learning Videos</h2>
    <p id="learn-description" class="section-subtitle"></p>
    <p class="panel-note">This path is curated to cover the full domain. Use Fullscreen for focused learning.</p>
    <p id="path-progress" class="meta progress"></p>
    <button id="complete-path-btn" class="button-secondary">Complete Path</button>
    <section class="quiz-panel">
      <div class="video-actions">
        <button id="generate-flashcards-btn" class="button-secondary" type="button">Generate Flashcards</button>
      </div>
      <p id="flashcard-status" class="status"></p>
      <div id="flashcard-root"></div>
    </section>
    <div id="videos" class="video-container"></div>
  </section>

  <aside id="chatbot" class="panel chatbot-panel">
    <h3>AI Mentor</h3>
    <p class="section-subtitle">Ask any concept or coding doubt here.</p>
    <div id="chat-messages" class="chat-messages"></div>
    <input id="question" placeholder="Ask your doubt">
    <button id="ask-btn" onclick="askAI()">Ask</button>
  </aside>
</main>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/learn.js"></script>
<script type="module" src="js/chatbot.js"></script>
<script type="module" src="js/logout.js"></script>
</body>
</html>
