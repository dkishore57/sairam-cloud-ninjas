<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="page">
<header class="topbar">
  <div class="brand">AI ASCEND</div>
  <nav class="topnav">
    <a class="text-link" href="index.html">Home</a>
    <a class="text-link" href="learn.html">Learn</a>
    <button class="text-link-btn logout-btn" type="button">Logout</button>
  </nav>
</header>

<main class="dashboard-main">
  <section class="section-head">
    <p class="eyebrow">Learning Paths</p>
    <h2>Select Your Focus Area</h2>
    <p class="section-subtitle">Each domain is designed as a complete study plan with high-quality tutorials from fundamentals to project-level readiness.</p>
  </section>

  <section class="panel filters">
    <input id="path-search" placeholder="Search path, topic, or keyword">
    <select id="level-filter">
      <option value="all">All Levels</option>
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
  </section>

  <section id="progress-stats" class="stats-grid">
  </section>

  <section id="path-grid" class="card-grid">
  </section>
</main>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/logout.js"></script>
</body>
</html>
